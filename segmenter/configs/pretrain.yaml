# Default segmenter pretraining config for the OSS release.
#
# Required environment variables / paths:
#   TRAJTOK_DATA_ROOT     — root containing all dataset jsons / tar archives.
#                            Defaults to ./data.
#   TRAJTOK_OUTPUT_DIR    — where checkpoints + logs go. Defaults to ./results.
#
# Dataset layout (see README.md "Data preparation" section for full details):
#   ${TRAJTOK_DATA_ROOT}/
#       metadata/
#           big_images_new.json          # image-caption-mask annotations
#           big_videos_new.json          # video-caption-mask annotations
#       sa1b/sa_*.tar                    # SA-1B sharded webdataset
#       sav/videos_fps6/  + sav/sav_instances/   # SA-V videos + instance masks

data_root:     ${oc.env:TRAJTOK_DATA_ROOT,./data}
output_root:   ${oc.env:TRAJTOK_OUTPUT_DIR,./results}

anno_root_filtered: ${data_root}/metadata

# ---- Available corpora ----
# Each entry is a triple: [annotation_file_or_glob, image_root_prefix, media_type]
# media_type ∈ {image, video, sa1b, sav}. For image/video, image_root_prefix is
# joined with the per-entry "image"/"video" field in the annotation JSON.
available_corpus:
  big_image_new: ['${anno_root_filtered}/big_images_new.json', '/', image]
  big_video_new: ['${anno_root_filtered}/big_videos_new.json', '/', video]

  # SA-1B webdataset (panoptic segmentation, images)
  sa1b: ['${data_root}/sa1b/sa_*.tar', sa1b]

  # SA-V video segmentation (videos + instance annotations)
  sav_train: ['${data_root}/sav/videos_fps6/', '${data_root}/sav/sav_instances/', sav]

  # ---- Mixtures ----
  # Headline released checkpoint was trained on `filteredmixdata_all`:
  filteredmixdata_all:
    - ${available_corpus.big_image_new}
    - ${available_corpus.big_video_new}
    - ${available_corpus.sa1b}
    - ${available_corpus.sav_train}
  # Smaller variants for ablations or limited-data setups:
  filteredmixdata_new:
    - ${available_corpus.big_image_new}
    - ${available_corpus.big_video_new}
  filteredmixdata_sa1b:
    - ${available_corpus.big_image_new}
    - ${available_corpus.big_video_new}
    - ${available_corpus.sa1b}
  sav_only:
    - ${available_corpus.sav_train}

train_corpus: filteredmixdata_all
train_file: ${available_corpus[${train_corpus}]}

# Evaluation is disabled by default in the OSS release — the in-loop
# retrieval evals depend on additional data that's not bundled. Use the
# standalone `scripts/eval_davis.py` instead.
test_corpus: all
test_file: {}
test_file_image: {}

text_encoder: bert-base-uncased
bert_config: configs/config_bert.json
vit_type: simplesegmenter
add_temporal_embed: False

image_res: 224
mask_down_factor: 1
embed_dim: 256

video_input:
  num_frames: 8
  reader: decord
  sample_type: middle
  num_frames_test: 8
  sample_type_test: middle
  version_ext: _v0
max_txt_l:
  image: 77
  video: 77
  sa1b: 77
  sav: 77

traj_model:
  model_name: vit-large
  embed_dim: 512
  segment_embed_dim: 512
  latent_res: 56
  output_res: 56
  loss_func: dice_focal
  num_traj: 128
  total_latent_level: 0
  pretrained: false
  pool: cls
  pre_select_latents: true
  attend_other_latents: false
  rope_3d: false
  no_high_res: false
  add_mean_traj: false
backbone:
  backbone_model: dinov3_small
  backbone_pretrained: true
  backbone_output_hierarchy: false
  backbone_pool: sum
  freeze: false
perceiver:
  depth: 2

batch_size:
  image: 64
  video: 8
  sa1b: 64
  sav: 8
batch_size_test:
  image: 64
  video: 8
k_test: 128
temp: 0.07
mlm_prob: 0.5
loss_weight:
  itc: 1.0       # contrastive loss (only enabled in trajvitv2 mode)
  mlm: 1.0
  itm: 1.0
  icl: 1.0       # segmentation loss weight
itm_hard_neg: True

optimizer:
  opt: adamW
  lr: 1e-4
  opt_betas: [0.9, 0.999]
  weight_decay: 0.02
  max_grad_norm: 10
  different_lr:
    enable: False
    module_names: [temporal_vision_encoder, ]
    lr: 1e-4
  finetune_lr: 1e-5

scheduler:
  sched: cosine
  epochs: 20
  min_lr_multi: 0.01
  warmup_epochs: 1
  finetune_epochs: 0

output_dir: ${output_root}/segmenter_default
resume: False
partial_resume: False
pretrained_path: None
image_pretrained_path: None
load_vision_only: False
evaluate: False
eval_frame_ensemble: concat
eval_x_only: False
eval_offload: True
device: cuda
seed: 42
log_freq: 30
eval_freq: 3
save_freq: 3
distributed: True
fp16: True
debug: False
num_workers: 8
num_workers_test: 4
onlyapp: False

wandb:
  enable: True
  entity: None
  project: trajtok-segmenter
  group: default

use_gt_mask: false

sa1b:
  max_objects: 256
  shuffle_buffer: 5000
  num_samples: 11000000  # approximate total samples in SA-1B-merged

sav:
  max_objects: 256
  num_samples: 48000     # ~48K videos with instance annotations
